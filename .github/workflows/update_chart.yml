name: Update NBA Chart

on:
  schedule:
    - cron: '0 12 * * *'  # noon UTC daily
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run refresh
        run: python refresh_data.py

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html bbref_east.html bbref_west.html
          git diff --staged --quiet || git commit -m "Auto-update chart $(date -u '+%Y-%m-%d')"
          git push
